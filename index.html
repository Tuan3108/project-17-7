<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Báo Thức Thông Minh - Antigravity</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a0f1d 0%, #070714 50%, #1a0b2e 100%);
            --primary-glow: 0 0 20px rgba(139, 92, 246, 0.4);
            --danger-glow: 0 0 25px rgba(239, 68, 68, 0.6);
            --success-glow: 0 0 20px rgba(16, 185, 129, 0.4);
            --warning-glow: 0 0 20px rgba(245, 158, 11, 0.5);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.07);
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating background blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            top: 10%;
            left: 10%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #ec4899;
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Clock Widget */
        .clock-widget {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            position: relative;
        }

        .clock-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.05);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .digital-time {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: var(--primary-glow);
            letter-spacing: 2px;
            line-height: 1;
        }

        .digital-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Set Alarm Section */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title svg {
            width: 18px;
            height: 18px;
            color: var(--accent-color);
        }

        .alarm-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .time-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .time-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .time-input-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .time-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: white;
            font-size: 1.8rem;
            padding: 10px;
            text-align: center;
            outline: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            -moz-appearance: none;
            -webkit-appearance: none;
        }

        .time-select:focus {
            border-color: var(--accent-color);
            box-shadow: var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .time-separator {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-top: 15px;
        }

        .text-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .text-input-group label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .custom-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            padding: 12px 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            border-color: var(--accent-color);
            box-shadow: var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            flex: 2;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--primary-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-color);
            flex: 1;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Alarms List */
        .alarms-list-container {
            display: flex;
            flex-direction: column;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .alarms-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .alarms-list-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .alarms-list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .no-alarms {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 20px 0;
            font-style: italic;
        }

        .alarm-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        .alarm-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateX(3px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alarm-item-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .alarm-item-time {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alarm-item-snooze-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .alarm-item-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .alarm-item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(239, 68, 68, 0.6);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            color: rgba(239, 68, 68, 1);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Ringing Overlay */
        .alarm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(7, 4, 15, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .alarm-overlay.active {
            opacity: 1;
            pointer-events: auto;
            animation: pulseBg 3s infinite alternate ease-in-out;
        }

        @keyframes pulseBg {
            0% { background-color: rgba(7, 4, 15, 0.92); }
            100% { background-color: rgba(26, 7, 7, 0.95); }
        }

        .overlay-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 90%;
            max-width: 400px;
            animation: scaleUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .alarm-bell-icon {
            width: 100px;
            height: 100px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--danger-glow);
            animation: ringBell 0.5s infinite alternate ease-in-out;
        }

        .alarm-bell-icon svg {
            width: 50px;
            height: 50px;
            color: #ef4444;
        }

        @keyframes ringBell {
            0% { transform: rotate(-15deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.1); }
        }

        .alarm-alert-title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: var(--danger-glow);
        }

        .alarm-alert-time {
            font-family: 'Rajdhani', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .alarm-alert-label {
            font-size: 1.1rem;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 320px;
            word-wrap: break-word;
        }

        .overlay-actions {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-dismiss {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
        }

        .btn-dismiss:hover {
            transform: translateY(-2px);
            box-shadow: var(--danger-glow);
        }

        .btn-snooze {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-snooze:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: #f59e0b;
            box-shadow: var(--warning-glow);
            color: #f59e0b;
        }

        .btn-snooze svg {
            width: 20px;
            height: 20px;
        }

        /* Sound check bar */
        .sound-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .sound-status.active {
            color: #10b981;
        }

        .credit {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        .credit span {
            display: inline-block;
            background: linear-gradient(135deg, #a78bfa, #f472b6, #818cf8);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            padding: 8px 24px;
            border-radius: 30px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background-color: rgba(139, 92, 246, 0.08);
            animation: shimmer 3s ease-in-out infinite alternate, glowPulse 2s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.15); }
            100% { box-shadow: 0 0 25px rgba(139, 92, 246, 0.35); }
        }
    </style>
</head>
<body>

    <!-- Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- App Container -->
    <div class="app-container">
        <!-- Header -->
        <header>
            <h1>ALARM CLOCK</h1>
            <div class="sound-status" id="sound-status">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <span>Audio Engine Sẵn Sàng</span>
            </div>
        </header>

        <!-- Current Clock -->
        <div class="clock-widget" id="clock-widget">
            <div class="clock-ring" id="clock-ring"></div>
            <div class="digital-time" id="current-time">00:00:00</div>
            <div class="digital-date" id="current-date">Thứ Tư, 15 Tháng 7, 2026</div>
        </div>

        <!-- Alarm Form -->
        <div>
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Hẹn Báo Thức Mới
            </div>
            <div class="alarm-form">
                <div class="time-inputs">
                    <div class="time-input-group">
                        <label for="hours-select">Giờ</label>
                        <select class="time-select" id="hours-select"></select>
                    </div>
                    <div class="time-separator">:</div>
                    <div class="time-input-group">
                        <label for="minutes-select">Phút</label>
                        <select class="time-select" id="minutes-select"></select>
                    </div>
                </div>

                <div class="text-input-group">
                    <label for="alarm-label">Nhãn báo thức</label>
                    <input type="text" class="custom-input" id="alarm-label" placeholder="Ví dụ: Thức dậy học bài..." value="Báo thức!">
                </div>

                <div class="form-actions">
                    <button class="btn btn-secondary" id="btn-test-sound">Thử chuông</button>
                    <button class="btn btn-primary" id="btn-set-alarm">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Đặt Báo Thức
                    </button>
                </div>
            </div>
        </div>

        <!-- Alarms List -->
        <div>
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                Báo Thức Đang Đợi
            </div>
            <div class="alarms-list-container" id="alarms-list">
                <!-- Dynamically populated -->
                <div class="no-alarms">Chưa có báo thức nào được đặt.</div>
            </div>
        </div>
    </div>

    <!-- Credit -->
    <div class="credit"><span>TẠO BỞI TUẤN TIỀN TỈ</span></div>

    <!-- Alarm Ringing Fullscreen Overlay -->
    <div class="alarm-overlay" id="alarm-overlay">
        <div class="overlay-content">
            <div class="alarm-bell-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>
            <div class="alarm-alert-title">BÁO THỨC ĐANG REO!</div>
            <div class="alarm-alert-time" id="overlay-time">00:00</div>
            <div class="alarm-alert-label" id="overlay-label">Nhãn báo thức</div>
            <div class="overlay-actions">
                <button class="btn btn-dismiss" id="btn-dismiss">Tắt ngay</button>
                <button class="btn btn-snooze" id="btn-snooze">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"></path><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Snooze (Hoãn 5 phút)
                </button>
            </div>
        </div>
    </div>

    <script>
        // State management
        let alarms = [];
        let ringingAlarm = null;
        let isAudioPlaying = false;
        let audioCtx = null;
        let alarmSoundInterval = null;

        // Elements
        const currentTimeEl = document.getElementById('current-time');
        const currentDateEl = document.getElementById('current-date');
        const hoursSelect = document.getElementById('hours-select');
        const minutesSelect = document.getElementById('minutes-select');
        const alarmLabelInput = document.getElementById('alarm-label');
        const btnSetAlarm = document.getElementById('btn-set-alarm');
        const btnTestSound = document.getElementById('btn-test-sound');
        const alarmsListEl = document.getElementById('alarms-list');
        const clockRing = document.getElementById('clock-ring');

        // Overlay elements
        const alarmOverlay = document.getElementById('alarm-overlay');
        const overlayTime = document.getElementById('overlay-time');
        const overlayLabel = document.getElementById('overlay-label');
        const btnDismiss = document.getElementById('btn-dismiss');
        const btnSnooze = document.getElementById('btn-snooze');
        const soundStatusEl = document.getElementById('sound-status');

        // Initialize selectors
        function initSelectors() {
            // Hours 00-23
            for (let i = 0; i < 24; i++) {
                const opt = document.createElement('option');
                const val = i.toString().padStart(2, '0');
                opt.value = val;
                opt.textContent = val;
                hoursSelect.appendChild(opt);
            }
            // Minutes 00-59
            for (let i = 0; i < 60; i++) {
                const opt = document.createElement('option');
                const val = i.toString().padStart(2, '0');
                opt.value = val;
                opt.textContent = val;
                minutesSelect.appendChild(opt);
            }

            // Set default to current time + 1 minute
            const now = new Date();
            let defHours = now.getHours();
            let defMinutes = now.getMinutes() + 1;
            if (defMinutes >= 60) {
                defMinutes = 0;
                defHours = (defHours + 1) % 24;
            }
            hoursSelect.value = defHours.toString().padStart(2, '0');
            minutesSelect.value = defMinutes.toString().padStart(2, '0');
        }

        // Initialize Audio context on first user interaction
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                soundStatusEl.classList.add('active');
                soundStatusEl.querySelector('span').textContent = 'Audio Sẵn Sàng';
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Web Audio Synthesizer for high-tech digital beep
        function playBeep(frequency, type, duration) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = type || 'sine';
                osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration - 0.05);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.error("Lỗi âm thanh Web Audio:", e);
            }
        }

        // Start playing alarm ring sound pattern
        function startAlarmAudio() {
            initAudio();
            if (isAudioPlaying) return;
            isAudioPlaying = true;

            const makeAlarmSound = () => {
                if (!isAudioPlaying) return;
                // Double high pitched beep (Retro/Digital Sci-Fi)
                playBeep(880, 'square', 0.15); // A5 Square for punch
                setTimeout(() => {
                    if (isAudioPlaying) playBeep(880, 'square', 0.15);
                }, 200);
            };

            makeAlarmSound();
            alarmSoundInterval = setInterval(makeAlarmSound, 1000);
        }

        // Stop playing alarm ring sound
        function stopAlarmAudio() {
            isAudioPlaying = false;
            if (alarmSoundInterval) {
                clearInterval(alarmSoundInterval);
                alarmSoundInterval = null;
            }
        }

        // Format Date string in Vietnamese
        function getVietnameseDateString(d) {
            const weekdays = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const day = weekdays[d.getDay()];
            const date = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            return `${day}, ${date} Tháng ${month}, ${year}`;
        }

        // Update real time clock
        function updateClock() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            
            currentTimeEl.textContent = `${hours}:${minutes}:${seconds}`;
            currentDateEl.textContent = getVietnameseDateString(now);

            // Clock pulse animation trigger
            clockRing.style.boxShadow = `inset 0 0 20px rgba(139, 92, 246, ${0.05 + (now.getSeconds() % 2 === 0 ? 0.08 : 0)})`;

            // Check if any alarm is triggered
            checkAlarms(now);
        }

        // Alarm object creation logic
        function calculateTargetTime(timeStr) {
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            const target = new Date();
            target.setHours(hours, minutes, 0, 0);
            // If the time already passed today, set to tomorrow
            if (target <= now) {
                target.setDate(target.getDate() + 1);
            }
            return target;
        }

        // Check active alarms against current time
        function checkAlarms(now) {
            if (ringingAlarm) return; // Prevent multiple overlays if one is already ringing

            const nowSec = Math.floor(now.getTime() / 1000);

            for (let alarm of alarms) {
                if (alarm.enabled) {
                    const alarmSec = Math.floor(new Date(alarm.targetTime).getTime() / 1000);
                    if (nowSec >= alarmSec) {
                        triggerAlarm(alarm);
                        break;
                    }
                }
            }
        }

        // Trigger alarm state
        function triggerAlarm(alarm) {
            ringingAlarm = alarm;
            overlayTime.textContent = new Date(alarm.targetTime).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
            overlayLabel.textContent = alarm.label || "Báo thức reo!";
            
            alarmOverlay.classList.add('active');
            startAlarmAudio();
        }

        // Load alarms from local storage
        function loadAlarms() {
            const stored = localStorage.getItem('smart_alarms');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    const now = new Date();
                    alarms = parsed.map(alarm => {
                        let target = new Date(alarm.targetTime);
                        // If it's in the past and still enabled, let's reschedule it for future
                        if (target <= now && alarm.enabled) {
                            // Calculate tomorrow or next slot for that time string
                            target = calculateTargetTime(alarm.time);
                        }
                        return {
                            ...alarm,
                            targetTime: target
                        };
                    });
                } catch(e) {
                    alarms = [];
                }
            }
            sortAlarms();
            saveAlarms();
            renderAlarms();
        }

        // Save alarms to local storage
        function saveAlarms() {
            localStorage.setItem('smart_alarms', JSON.stringify(alarms));
        }

        // Sort alarms chronologically
        function sortAlarms() {
            alarms.sort((a, b) => new Date(a.targetTime) - new Date(b.targetTime));
        }

        // Render alarms in the list
        function renderAlarms() {
            alarmsListEl.innerHTML = '';
            
            if (alarms.length === 0) {
                alarmsListEl.innerHTML = '<div class="no-alarms">Chưa có báo thức nào được đặt.</div>';
                return;
            }

            alarms.forEach(alarm => {
                const dateObj = new Date(alarm.targetTime);
                const timeStr = dateObj.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                
                // Determine day string (hôm nay / ngày mai / ngày cụ thể)
                const now = new Date();
                let dayLabel = "Hôm nay";
                if (dateObj.getDate() !== now.getDate()) {
                    dayLabel = "Ngày mai";
                }

                const item = document.createElement('div');
                item.className = `alarm-item ${alarm.enabled ? '' : 'disabled'}`;
                item.style.opacity = alarm.enabled ? '1' : '0.6';

                let snoozeBadge = '';
                if (alarm.snoozeCount > 0) {
                    snoozeBadge = `<span class="alarm-item-snooze-badge">Snooze x${alarm.snoozeCount}</span>`;
                }

                item.innerHTML = `
                    <div class="alarm-item-left">
                        <div class="alarm-item-time">
                            ${timeStr}
                            ${snoozeBadge}
                        </div>
                        <div class="alarm-item-label">${alarm.label || 'Không có nhãn'} (${dayLabel})</div>
                    </div>
                    <div class="alarm-item-right">
                        <label class="switch">
                            <input type="checkbox" ${alarm.enabled ? 'checked' : ''} onchange="toggleAlarm(${alarm.id}, this.checked)">
                            <span class="slider"></span>
                        </label>
                        <button class="delete-btn" onclick="deleteAlarm(${alarm.id})" title="Xóa báo thức">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                `;
                alarmsListEl.appendChild(item);
            });
        }

        // Toggle alarm enabled status
        window.toggleAlarm = function(id, enabled) {
            initAudio();
            const idx = alarms.findIndex(a => a.id === id);
            if (idx !== -1) {
                alarms[idx].enabled = enabled;
                
                // If re-enabling, reset target time based on original input time string
                if (enabled) {
                    alarms[idx].targetTime = calculateTargetTime(alarms[idx].time);
                    alarms[idx].snoozeCount = 0; // Reset snooze count when manually toggled
                }
                
                sortAlarms();
                saveAlarms();
                renderAlarms();
            }
        };

        // Delete an alarm
        window.deleteAlarm = function(id) {
            initAudio();
            alarms = alarms.filter(a => a.id !== id);
            saveAlarms();
            renderAlarms();
        };

        // Set new alarm handler
        btnSetAlarm.addEventListener('click', () => {
            initAudio();
            const hours = hoursSelect.value;
            const minutes = minutesSelect.value;
            const timeStr = `${hours}:${minutes}`;
            const labelStr = alarmLabelInput.value.trim() || "Báo thức";

            const newAlarm = {
                id: Date.now(),
                time: timeStr,
                label: labelStr,
                targetTime: calculateTargetTime(timeStr),
                enabled: true,
                snoozeCount: 0
            };

            alarms.push(newAlarm);
            sortAlarms();
            saveAlarms();
            renderAlarms();

            // Highlight setup completion visually
            btnSetAlarm.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            btnSetAlarm.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Đã đặt!`;
            
            setTimeout(() => {
                btnSetAlarm.style.background = '';
                btnSetAlarm.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Đặt Báo Thức`;
            }, 1500);
        });

        // Test Sound Button
        btnTestSound.addEventListener('click', () => {
            initAudio();
            if (isAudioPlaying) {
                stopAlarmAudio();
                btnTestSound.textContent = 'Thử chuông';
                btnTestSound.style.borderColor = '';
                btnTestSound.style.color = '';
            } else {
                startAlarmAudio();
                btnTestSound.textContent = 'Dừng thử';
                btnTestSound.style.borderColor = '#ef4444';
                btnTestSound.style.color = '#ef4444';
                
                // Auto stop after 5 seconds to not annoy
                setTimeout(() => {
                    if (isAudioPlaying && !ringingAlarm) {
                        stopAlarmAudio();
                        btnTestSound.textContent = 'Thử chuông';
                        btnTestSound.style.borderColor = '';
                        btnTestSound.style.color = '';
                    }
                }, 5000);
            }
        });

        // Dismiss Alarm Action
        btnDismiss.addEventListener('click', () => {
            if (!ringingAlarm) return;
            
            stopAlarmAudio();
            alarmOverlay.classList.remove('active');
            
            // Disable the alarm since it has successfully rung and been dismissed
            // (Unless it was a snoozed item, in which case we disable the original source)
            const origId = ringingAlarm.id;
            const idx = alarms.findIndex(a => a.id === origId);
            if (idx !== -1) {
                alarms[idx].enabled = false;
                alarms[idx].snoozeCount = 0; // Reset snooze count
            }

            ringingAlarm = null;
            saveAlarms();
            renderAlarms();
        });

        // Snooze Alarm Action
        btnSnooze.addEventListener('click', () => {
            if (!ringingAlarm) return;

            stopAlarmAudio();
            alarmOverlay.classList.remove('active');

            // Calculate new trigger time (exactly 5 minutes after current targetTime)
            const oldTarget = new Date(ringingAlarm.targetTime);
            const newTarget = new Date(oldTarget.getTime() + 5 * 60 * 1000); // add 5 minutes

            const idx = alarms.findIndex(a => a.id === ringingAlarm.id);
            if (idx !== -1) {
                // Update the existing alarm in place
                alarms[idx].targetTime = newTarget;
                alarms[idx].snoozeCount = (alarms[idx].snoozeCount || 0) + 1;
                alarms[idx].enabled = true; // Ensure it remains enabled
            }

            ringingAlarm = null;
            sortAlarms();
            saveAlarms();
            renderAlarms();
        });

        // Global Click listener to ensure audio context activation
        document.body.addEventListener('click', () => {
            initAudio();
        }, { once: false });

        // Initialize App
        window.addEventListener('DOMContentLoaded', () => {
            initSelectors();
            loadAlarms();
            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
